<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pembayaran Berhasil — RanzAI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f0f7ff;
  font-family:'Segoe UI',sans-serif;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:48px 40px;
  text-align:center;
  box-shadow:0 20px 60px rgba(26,107,255,.12);
  border:1px solid rgba(0,100,220,.10);
  max-width:420px;
  width:90%;
}
.icon{
  width:72px;
  height:72px;
  border-radius:50%;
  background:rgba(34,229,160,.12);
  border:2px solid rgba(34,229,160,.30);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 24px;
  font-size:36px;
}
h1{
  font-size:22px;
  font-weight:800;
  color:#0d1f3c;
  margin-bottom:10px;
}
p{
  color:#6b84a8;
  font-size:14px;
  line-height:1.7;
  margin-bottom:28px;
}
.btn{
  display:inline-block;
  padding:13px 28px;
  border-radius:12px;
  background:linear-gradient(135deg,#1a6bff,#00d4c8);
  color:#fff;
  font-size:14px;
  font-weight:800;
  text-decoration:none;
  box-shadow:0 8px 24px rgba(26,107,255,.28);
}
.countdown{
  margin-top:14px;
  color:#9ab0ce;
  font-size:12px;
  font-weight:600;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Pembayaran Berhasil!</h1>
  <p>Ranz Coin kamu sedang diproses dan akan segera masuk ke akun. Kamu akan diarahkan ke dashboard otomatis.</p>
  <a href="/dashboard/?topup=success" class="btn">Ke Dashboard →</a>
  <div class="countdown" id="countdown">Redirect otomatis dalam 3 detik...</div>
</div>

<script>
let sec = 3;
const el = document.getElementById("countdown");
const interval = setInterval(() => {
  sec--;
  el.textContent = "Redirect otomatis dalam " + sec + " detik...";
  if(sec <= 0){
    clearInterval(interval);
    window.location.replace("/dashboard/?topup=success");
  }
}, 1000);
</script>
</body>
</html>
